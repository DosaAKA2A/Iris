<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80.73 80.71">
  <defs>
    <style>
      .iris-outer {
        fill: #ffffff;
        fill-rule: evenodd;
        transform-origin: 40.36px 40.35px;
        animation: iris-breathe 3.2s ease-in-out infinite;
      }
      .iris-pupil {
        fill: #ffffff;
        fill-rule: evenodd;
        transform-origin: 62px 40.35px;
        animation: pupil-pulse 3.2s ease-in-out infinite;
      }
      @keyframes iris-breathe {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.7; transform: scale(0.96); }
      }
      @keyframes pupil-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50%       { transform: scale(1.15); opacity: 0.85; }
      }
    </style>
  </defs>
