<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Tools — IRIS</title>
<link rel="icon" type="image/svg+xml" href="assets/iris-favicon.svg">
<meta name="description" content="Laboratorio de imagen de IRIS. Gradientes mesh, óptica, dithering, halftone y ASCII en el navegador. Sin cuenta, sin límites.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --bg:#0d0d0f;--stage:#0a0a0c;--panel:#151518;--panel-2:#1b1b1f;
    --line:#2a2a30;--line-soft:#202024;--ink:#f4f2ea;--ink-dim:#a2a2ac;--ink-faint:#6b6b74;
    --safe:#ff5c38;--safe-dim:#c9482d;--radius:10px;
    --mono:'Geist Mono',ui-monospace,Menlo,monospace;--sans:'Inter',system-ui,sans-serif;--display:'Clash Display','Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.4;overflow:hidden;-webkit-font-smoothing:antialiased}
  ::selection{background:var(--safe);color:#0a0a0c}
  button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
  input,select{font-family:inherit}
  :focus-visible{outline:2px solid var(--safe);outline-offset:2px;border-radius:4px}
  .app{display:grid;grid-template-rows:auto 1fr;height:100vh;height:100dvh}

  /* top */
  .topbar{display:flex;align-items:center;gap:16px;padding:12px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#111113,#0d0d0f)}
  .brand{display:flex;align-items:baseline;gap:9px;user-select:none}
  .brand .iris{font-family:var(--display);font-weight:700;font-size:19px;letter-spacing:.06em;color:#fff}
  .brand .divider{width:1px;height:15px;background:var(--line);transform:translateY(2px)}
  .brand .tool{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--ink-dim);text-transform:uppercase}
  .badge-free{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--safe);border:1px solid var(--safe-dim);border-radius:20px;padding:3px 8px;background:rgba(255,92,56,.06)}
  .modesw{display:flex;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:2px;margin-left:6px}
  .modesw button{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;padding:6px 12px;border-radius:6px;color:var(--ink-faint);transition:.13s}
  .modesw button.active{background:var(--safe);color:#0a0a0c;font-weight:600}
  .topbar .spacer{flex:1}
  .top-btn{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:8px 14px;border:1px solid var(--line);border-radius:7px;color:var(--ink-dim);transition:.15s;background:var(--panel)}
  .top-btn:hover{border-color:var(--ink-faint);color:var(--ink)}
  .top-btn.primary{background:var(--safe);color:#0a0a0c;border-color:var(--safe);font-weight:600}
  .top-btn.primary:hover{background:#ff6d4c}
  .top-btn:disabled{opacity:.35;cursor:not-allowed}
  .top-btn.ghost.on{border-color:var(--safe);color:var(--safe)}

  .body{display:grid;grid-template-columns:64px 1fr 292px;min-height:0}
  .rail{border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 0;overflow-y:auto}
  .rail-btn{width:44px;height:44px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--ink-dim);border:1px solid transparent;transition:.14s;position:relative}
  .rail-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.6}
  .rail-btn .rl{font-family:var(--mono);font-size:7.5px;letter-spacing:.04em;text-transform:uppercase}
  .rail-btn:hover{color:var(--ink-dim);background:var(--panel-2)}
  .rail-btn.active{color:var(--safe);background:var(--panel-2);border-color:var(--line)}
  .rail-btn.active::before{content:"";position:absolute;left:-1px;top:8px;bottom:8px;width:2px;background:var(--safe);border-radius:2px}
  .rail-swatch{width:44px;height:34px;border-radius:8px;border:1px solid var(--line);cursor:pointer;transition:.13s}
  .rail-swatch:hover{border-color:var(--safe);transform:scale(1.04)}
  .rail-lbl{font-family:var(--mono);font-size:7.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-dim);margin:6px 0 2px}
  .rail-sep{width:28px;height:1px;background:var(--line);margin:8px auto}

  .stage{background:var(--stage);position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.03) 1px,transparent 0);background-size:22px 22px}
  .canvas-wrap{position:relative;max-width:calc(100% - 16px);max-height:calc(100% - 16px);box-shadow:0 24px 60px rgba(0,0,0,.5)}
  canvas{display:block;max-width:100%;max-height:calc(100vh - 52px);background:#000}
  #view{image-rendering:pixelated}
  .stage-hud{position:absolute;left:16px;bottom:14px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--ink-faint);pointer-events:none;display:flex;gap:14px}
  .stage-hud b{color:var(--ink-dim);font-weight:500}
  .drop-hint{position:absolute;left:16px;top:14px;font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:var(--ink-faint);pointer-events:none;transition:.2s}
  .drop-hint .cta{pointer-events:auto;cursor:pointer;color:var(--ink-dim);border-bottom:1px dotted var(--ink-faint)}
  .drop-hint .cta:hover{color:var(--safe);border-color:var(--safe)}
  .stage.dragover{outline:2px solid var(--safe);outline-offset:-8px}

  .panel{border-left:1px solid var(--line);background:var(--panel);overflow-y:auto;display:flex;flex-direction:column}
  .panel::-webkit-scrollbar,.rail::-webkit-scrollbar{width:8px}
  .panel::-webkit-scrollbar-thumb,.rail::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  .grp{border-bottom:1px solid var(--line-soft);padding:16px}
  .grp-title{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .grp-title::after{content:"";flex:1;height:1px;background:var(--line-soft)}

  .pills{display:flex;flex-wrap:wrap;gap:6px}
  .pill{font-family:var(--mono);font-size:10.5px;letter-spacing:.03em;padding:6px 10px;border-radius:6px;border:1px solid var(--line);color:var(--ink-dim);transition:.13s;background:var(--panel-2);text-transform:uppercase}
  .pill:hover{border-color:var(--ink-faint);color:var(--ink)}
  .pill.active{background:var(--safe);color:#0a0a0c;border-color:var(--safe);font-weight:600}

  .ctl{margin-bottom:15px}.ctl:last-child{margin-bottom:0}
  .ctl-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .ctl-label{font-size:12px;color:var(--ink-dim)}
  .ctl-val{font-family:var(--mono);font-size:11px;color:var(--ink)}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;border-radius:3px;background:var(--line);cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--ink);border:2px solid var(--panel);box-shadow:0 0 0 1px var(--line);transition:.1s}
  input[type=range]::-webkit-slider-thumb:hover{background:var(--safe);box-shadow:0 0 0 1px var(--safe)}
  input[type=range]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--ink);border:2px solid var(--panel)}
  .sel{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:7px 10px;color:var(--ink);font-family:var(--mono);font-size:11px}
  .sel:focus{outline:none;border-color:var(--safe)}

  .swatches{display:flex;gap:10px}
  .swatch{flex:1}
  .swatch label{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);display:block;margin-bottom:6px}
  .swatch-btn{width:100%;height:34px;border-radius:7px;border:1px solid var(--line);position:relative;overflow:hidden;cursor:pointer;display:flex;align-items:center;padding-left:38px;font-family:var(--mono);font-size:10px;color:var(--ink-dim)}
  .swatch-btn .chip{position:absolute;left:5px;top:5px;bottom:5px;width:24px;border-radius:4px;border:1px solid rgba(255,255,255,.12)}
  .swatch-btn input{position:absolute;inset:0;opacity:0;cursor:pointer}

  .toggle-row{display:flex;align-items:center;justify-content:space-between}
  .switch{width:38px;height:22px;border-radius:12px;background:var(--line);position:relative;transition:.15s;flex-shrink:0}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--ink-dim);transition:.15s}
  .switch.on{background:var(--safe-dim)}.switch.on::after{transform:translateX(16px);background:var(--safe)}

  .preset-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
  .preset{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;padding:8px 6px;border:1px solid var(--line);border-radius:6px;color:var(--ink-dim);background:var(--panel-2);transition:.13s;text-align:center}
  .preset:hover{border-color:var(--safe);color:var(--ink)}
  .hint{font-family:var(--mono);font-size:9.5px;color:var(--ink-faint);line-height:1.5;letter-spacing:.02em}
  .charset-input{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:8px 10px;color:var(--ink);font-family:var(--mono);font-size:12px;letter-spacing:.05em}
  .charset-input:focus{outline:none;border-color:var(--safe)}

  /* gradient stop bar */
  .gradbar-wrap{margin-bottom:12px}
  .gradbar{position:relative;height:26px;border-radius:6px;border:1px solid var(--line);cursor:copy;overflow:visible}
  .stop{position:absolute;top:-4px;width:14px;height:34px;transform:translateX(-7px);cursor:grab;border-radius:4px;border:2px solid #0a0a0c;box-shadow:0 0 0 1px var(--line),0 2px 6px rgba(0,0,0,.5)}
  .stop.sel{border-color:var(--safe);box-shadow:0 0 0 2px var(--safe)}
  .stop:active{cursor:grabbing}
  .stop-tools{display:flex;gap:8px;align-items:center;margin-top:10px}
  .stop-tools .swatch-btn{height:30px;flex:1}
  .mini-btn{font-family:var(--mono);font-size:10px;padding:7px 11px;border:1px solid var(--line);border-radius:6px;color:var(--ink-dim);background:var(--panel-2);transition:.13s;text-transform:uppercase;letter-spacing:.05em}
  .mini-btn:hover{border-color:var(--safe);color:var(--ink)}

  .load-media{position:absolute;left:16px;top:14px;z-index:5;display:inline-flex;align-items:center;gap:7px;
    background:#f4f2ea;color:#0a0a0c;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;padding:11px 18px;border-radius:100px;box-shadow:0 4px 18px rgba(0,0,0,.45);
    transition:.15s;cursor:pointer}
  .load-media svg{width:14px;height:14px}
  .load-media:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(0,0,0,.55)}
  .cvmodes{display:flex;gap:4px}
  .cvmodes button{flex:1;font-family:var(--mono);font-size:11px;font-weight:700;padding:8px 0;border:1px solid var(--line);border-radius:7px;color:var(--ink-faint);transition:.13s}
  .cvmodes button:hover{color:var(--ink)}
  .cvmodes button.active{background:#f4f2ea;color:#0a0a0c;border-color:#f4f2ea}
  .brand-home{text-decoration:none;transition:.15s}
  .brand-home:hover .iris{color:var(--safe)}
  /* effects browser */
  .body.fx-mode{grid-template-columns:288px 1fr 344px}
  .body.fx-mode .rail{padding:0;align-items:stretch;gap:0;overflow-y:hidden;display:flex}
  .fxb{display:flex;flex-direction:column;height:100%;width:100%;min-height:0}
  .fxb-search{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line-soft);color:var(--ink-faint)}
  .fxb-search svg{width:15px;height:15px;flex:none}
  .fxb-search input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase}
  .fxb-search input::placeholder{color:var(--ink-faint)}
  .fxb-tabs{display:flex;gap:4px;padding:10px 12px;border-bottom:1px solid var(--line-soft)}
  .fxb-tabs button{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;padding:7px 13px;border-radius:100px;color:var(--ink-faint);transition:.13s}
  .fxb-tabs button:hover{color:var(--ink)}
  .fxb-tabs button.active{background:#f4f2ea;color:#0a0a0c;font-weight:600}
  .fxb-list{flex:1;overflow-y:auto;padding:12px;min-height:0}
  .fxb-list::-webkit-scrollbar{width:8px}
  .fxb-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  .fxb-cat{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);margin:14px 2px 10px}
  .fxb-cat:first-child{margin-top:2px}
  .fxb-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .fxb-card{display:flex;flex-direction:column;gap:6px;text-align:left;border-radius:8px;transition:.13s}
  .fxb-card:hover .fxb-thumb{border-color:var(--safe);transform:translateY(-1px)}
  .fxb-card:hover .fxb-name{color:var(--ink)}
  .fxb-thumb{position:relative;aspect-ratio:1/1.15;border-radius:8px;border:1px solid var(--line);overflow:hidden;transition:.15s;display:flex;align-items:center;justify-content:center}
  .fxb-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .fxb-ph{font-family:var(--mono);font-size:20px;font-weight:600;color:rgba(255,255,255,.28);letter-spacing:.05em}
  .fxb-name{font-family:var(--mono);font-size:10.5px;letter-spacing:.03em;color:var(--ink-dim);line-height:1.3}
  .fxb-card.active .fxb-thumb{border-color:var(--safe);box-shadow:0 0 0 1px var(--safe)}
  .fxb-card.active .fxb-name{color:var(--safe)}
  .shape-row{display:flex;gap:8px;margin-bottom:6px}
  .shape-row .rail-btn{width:52px;height:42px;padding:5px}
  .curvecv{width:100%;height:120px;border:1px solid var(--line);border-radius:8px;background:var(--panel-2);cursor:crosshair;touch-action:none;display:block}
  @media(max-width:820px){
    .body.fx-mode{grid-template-columns:150px 1fr}
    .fxb-grid{grid-template-columns:1fr}
  }
  /* effects stack */
  .fxl{border:1px solid var(--line);border-radius:8px;margin-bottom:8px;background:var(--panel-2);overflow:hidden}
  .fxl.off{opacity:.45}
  .fxl-head{display:flex;align-items:center;gap:7px;padding:9px 10px;cursor:pointer;user-select:none}
  .fxl-name{flex:1;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink)}
  .fxl-ico{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--ink-dim);border:1px solid transparent;transition:.12s;flex-shrink:0}
  .fxl-ico:hover{border-color:var(--line);color:var(--ink)}
  .fxl-ico svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.7}
  .fxl-ico.eye.on{color:var(--safe)}
  .fxl-ico.del:hover{color:#ff5c5c;border-color:rgba(255,92,92,.4)}
  .fxl-body{padding:4px 12px 12px;border-top:1px solid var(--line-soft);display:none}
  .fxl.open .fxl-body{display:block}
  .fxl-strength{display:flex;align-items:center;gap:10px;margin:10px 0 12px}
  .fxl-strength input{flex:1}
  .fxl-strength .ctl-val{min-width:36px;text-align:right}
  .fx-add{display:flex;gap:8px}
  .fx-add .sel{flex:1}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:11px 18px;font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:var(--ink);opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:0 12px 30px rgba(0,0,0,.5)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast b{color:var(--safe)}

  @media(max-width:820px){
    .body{grid-template-columns:52px 1fr;grid-template-rows:1fr auto}
    .panel{grid-column:1/-1;grid-row:2;border-left:none;border-top:1px solid var(--line);max-height:46vh;flex-direction:row;overflow-x:auto}
    .rail{grid-row:1;grid-column:1}.stage{grid-row:1;grid-column:2}
    .grp{border-bottom:none;border-right:1px solid var(--line-soft);min-width:240px}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
  /* Boton de marca = logo completo (vuelve al landing) */
  .brand{align-items:center}
  .brand-home{display:inline-flex;align-items:center}
  .brand-logo{display:block;height:22px;width:auto}
  .brand-home:hover .brand-logo{opacity:.72;transition:opacity .15s}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><a href="https://iris.it.com" class="brand-home" title="Volver a IRIS"><img class="brand-logo" src="assets/iris-logo-full.svg" alt="IRIS" /></a><span class="divider"></span><span class="tool">Creative Tools</span></div>
    <span class="badge-free">Free · No account</span>
    <div class="modesw">
      <button data-mode="effects" class="active">Effects</button>
      <button data-mode="compose">Compose</button>
      <button data-mode="reduce">Reduce</button>
    </div>
    <div class="spacer"></div>
    <button class="top-btn ghost" id="btn-animate">Animate</button>
    <button class="top-btn" id="btn-random">Randomize</button>
    <button class="top-btn" id="btn-reset-all">Reset</button>
    <button class="top-btn primary" id="btn-export">Export PNG</button>
    <input type="file" id="file" accept="image/*" hidden>
  </div>
  <div class="body">
    <div class="rail" id="rail"></div>
    <div class="stage" id="stage">
      <div class="canvas-wrap">
        <canvas id="glview"></canvas>
        <canvas id="view" style="display:none"></canvas>
        <canvas id="fxview" style="display:none"></canvas>
      </div>
      <button class="load-media" id="btn-load-media" title="Cargar imagen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Load media</button>
      <div class="stage-hud" id="hud"><span><b id="hud-a">GRADIENT</b></span><span id="hud-b">—</span></div>
    </div>
    <div class="panel" id="panel"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ═══════════════════════════════════════════════════════════════
   Creative Tools · IRIS Studio · V2
   COMPOSE : compositor WebGL (gradiente mesh + blend + óptica + grain + glass)
   REDUCE  : motor Canvas 2D (dither / halftone / ascii / dots / pixel)
   Código original. Técnicas de dominio público. Sin backend, libre de usar.
   ═══════════════════════════════════════════════════════════════ */

let MODE='compose';
let PHOTO=null;                      // HTMLImageElement compartido
const MAX_DIM=1100;

const glview=document.getElementById('glview');
const view=document.getElementById('view');
const vctx=view.getContext('2d');
const panel=document.getElementById('panel');
const rail=document.getElementById('rail');
const stage=document.getElementById('stage');

const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const hexRGB=h=>{h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];};
const hexF=h=>hexRGB(h).map(v=>v/255);
function toast(m){const t=document.getElementById('toast');t.innerHTML=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);}

/* ─────────────── COMPOSE state ─────────────── */
const G={
  stops:[{c:'#6c5ce7',p:0},{c:'#a29bfe',p:0.28},{c:'#fd79a8',p:0.55},{c:'#ffb8a2',p:0.78},{c:'#ffe08a',p:1}],
  sel:0,
  shape:0, angle:19, scale:1.66, warp:0.43, detail:2, contrast:1.14,
  opacity:0.85, blend:3,           // 3 = overlay
  aberration:0.38, softness:0, grain:0.06, blur:0,
  glass:0, glassAmt:0.5,
  animate:false, time:0,
};
const BLENDS=['Normal','Multiply','Screen','Overlay','Soft light','Add','Difference'];
const SHAPES=['Linear','Radial','Conic'];
const GLASS=['None','Fluted','Ripple','Mosaic'];
// Cada preset tiene: stops, shape (0=linear,1=radial,2=conic), angle, warp, scale, detail, contrast

/* ─────────────── WebGL ─────────────── */
const gl=glview.getContext('webgl',{preserveDrawingBuffer:true,antialias:true,premultipliedAlpha:false});
let glOK=!!gl, tex=null, prog=null, U={};
const VERT=`attribute vec2 a;varying vec2 v;void main(){v=a*0.5+0.5;gl_Position=vec4(a,0.,1.);}`;
const FRAG=`precision highp float;varying vec2 v;
uniform vec2 u_res;uniform sampler2D u_photo;uniform float u_hasPhoto;
uniform vec3 u_sc[8];uniform float u_sp[8];uniform int u_sn;
uniform int u_shape;uniform float u_angle,u_scale,u_warp,u_contrast,u_gopac;
uniform int u_detail,u_blend,u_glass;uniform float u_aberr,u_grain,u_glassAmt,u_time;
float hash(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
 float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
 return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);}
float fbm(vec2 p,int oct){float s=0.,a=.5;for(int i=0;i<8;i++){if(i>=oct)break;s+=a*noise(p);p*=2.02;a*=.5;}return s;}
vec3 gcol(float t){t=clamp(t,0.,1.);vec3 c=u_sc[0];
 for(int i=0;i<7;i++){if(i+1>=u_sn)break;float p0=u_sp[i],p1=u_sp[i+1];
  if(t>=p0){float f=clamp((t-p0)/max(p1-p0,1e-4),0.,1.);c=mix(u_sc[i],u_sc[i+1],f);}}return c;}
float gT(vec2 uv){vec2 p=uv-0.5;float c=cos(u_angle),s=sin(u_angle);p=mat2(c,-s,s,c)*p;p*=u_scale;
 if(u_warp>0.){vec2 q=vec2(fbm(p*1.5+u_time*.1,u_detail),fbm(p*1.5+vec2(5.2,1.3)-u_time*.1,u_detail));p+=(q-0.5)*u_warp*2.;}
 float t;if(u_shape==1)t=length(p)*1.2;else if(u_shape==2)t=atan(p.y,p.x)/6.2831853+0.5;else t=p.x+0.5;
 return (t-0.5)*u_contrast+0.5;}
vec3 blend(vec3 b,vec3 s,int m){
 if(m==1)return b*s;
 if(m==2)return 1.-(1.-b)*(1.-s);
 if(m==3)return mix(2.*b*s,1.-2.*(1.-b)*(1.-s),step(0.5,b));
 if(m==4)return mix(b-(1.-2.*s)*b*(1.-b),b+(2.*s-1.)*(sqrt(b)-b),step(0.5,s));
 if(m==5)return b+s;
 if(m==6)return abs(b-s);
 return s;}
vec2 glassUV(vec2 uv){
 if(u_glass==1)uv.x+=sin(uv.y*70.)*0.006*u_glassAmt;
 else if(u_glass==2){float r=length(uv-0.5);uv+=(uv-0.5)*sin(r*42.-u_time*2.)*0.03*u_glassAmt;}
 else if(u_glass==3){vec2 g=(floor(uv*48.)+0.5)/48.;uv=mix(uv,g,0.7*u_glassAmt);}
 return uv;}
void main(){vec2 uv=v;vec2 guv=glassUV(uv);vec3 photo=vec3(0.5);
 if(u_hasPhoto>0.5){vec2 dir=uv-0.5;float ab=u_aberr*0.012;
  photo.r=texture2D(u_photo,guv+dir*ab).r;photo.g=texture2D(u_photo,guv).g;photo.b=texture2D(u_photo,guv-dir*ab).b;}
 float t=gT(uv);vec3 g=gcol(t);
 vec3 o=(u_hasPhoto>0.5)?mix(photo,blend(photo,g,u_blend),u_gopac):g;
 if(u_grain>0.){float n=hash(uv*u_res+fract(u_time))-0.5;o+=n*u_grain;}
 gl_FragColor=vec4(clamp(o,0.,1.),1.);}`;

function compile(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))throw new Error(gl.getShaderInfoLog(s));return s;}
function glInit(){
  if(!glOK){toast('WebGL not available');return;}
  prog=gl.createProgram();
  gl.attachShader(prog,compile(gl.VERTEX_SHADER,VERT));
  gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,FRAG));
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog,gl.LINK_STATUS))throw new Error(gl.getProgramInfoLog(prog));
  gl.useProgram(prog);
  const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
  const a=gl.getAttribLocation(prog,'a');gl.enableVertexAttribArray(a);gl.vertexAttribPointer(a,2,gl.FLOAT,false,0,0);
  ['u_res','u_photo','u_hasPhoto','u_sc','u_sp','u_sn','u_shape','u_angle','u_scale','u_warp','u_contrast',
   'u_gopac','u_detail','u_blend','u_glass','u_aberr','u_grain','u_glassAmt','u_time']
   .forEach(n=>U[n]=gl.getUniformLocation(prog,n));
  tex=gl.createTexture();
}
function uploadPhoto(img){
  if(!glOK)return;
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,true);
  // pre-blur (image blur + softness) vía canvas si hace falta
  const b=G.blur+G.softness;
  let src=img;
  if(b>0){const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;
    const cx=c.getContext('2d');cx.filter=`blur(${b*3}px)`;cx.drawImage(img,0,0);src=c;}
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,src);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
}
function glSize(){
  let w=1280,h=720;
  if(PHOTO){w=PHOTO.naturalWidth;h=PHOTO.naturalHeight;}
  const s=Math.min(1,MAX_DIM/Math.max(w,h));return[Math.round(w*s),Math.round(h*s)];
}
function sortedStops(){return [...G.stops].sort((a,b)=>a.p-b.p);}
function glRender(){
  if(!glOK||MODE!=='compose')return;
  const [w,h]=glSize();
  if(glview.width!==w||glview.height!==h){glview.width=w;glview.height=h;}
  gl.viewport(0,0,w,h);gl.useProgram(prog);
  const st=sortedStops();const cols=new Float32Array(24),pos=new Float32Array(8);
  st.slice(0,8).forEach((s,i)=>{const f=hexF(s.c);cols[i*3]=f[0];cols[i*3+1]=f[1];cols[i*3+2]=f[2];pos[i]=s.p;});
  gl.uniform2f(U.u_res,w,h);
  gl.uniform3fv(U.u_sc,cols);gl.uniform1fv(U.u_sp,pos);gl.uniform1i(U.u_sn,Math.min(st.length,8));
  gl.uniform1i(U.u_shape,G.shape);gl.uniform1f(U.u_angle,G.angle*Math.PI/180);
  gl.uniform1f(U.u_scale,G.scale);gl.uniform1f(U.u_warp,G.warp);gl.uniform1f(U.u_contrast,G.contrast);
  gl.uniform1f(U.u_gopac,G.opacity);gl.uniform1i(U.u_detail,Math.round(G.detail));gl.uniform1i(U.u_blend,G.blend);
  gl.uniform1i(U.u_glass,G.glass);gl.uniform1f(U.u_aberr,G.aberration);gl.uniform1f(U.u_grain,G.grain);
  gl.uniform1f(U.u_glassAmt,G.glassAmt);gl.uniform1f(U.u_time,G.time);
  gl.uniform1f(U.u_hasPhoto,PHOTO?1:0);
  if(PHOTO){gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,tex);gl.uniform1i(U.u_photo,0);}
  gl.drawArrays(gl.TRIANGLES,0,3);
  document.getElementById('hud-a').textContent=SHAPES[G.shape].toUpperCase()+' · '+BLENDS[G.blend].toUpperCase();
  document.getElementById('hud-b').textContent=w+'×'+h;
}
let animRAF=null;
function animLoop(t){if(!G.animate){animRAF=null;return;}G.time=t/1000;glRender();animRAF=requestAnimationFrame(animLoop);}

/* ─────────────── COMPOSE panel ─────────────── */
function slider(o,label,key,min,max,step,unit='',mul=1){
  const val=(o[key]*mul);const disp=(step<1||mul!==1)?val.toFixed(2):Math.round(val);
  return `<div class="ctl"><div class="ctl-head"><span class="ctl-label">${label}</span>
    <span class="ctl-val" id="v-${key}">${disp}${unit}</span></div>
    <input type="range" min="${min}" max="${max}" step="${step}" value="${o[key]}" data-o="${o===G?'G':'S'}" data-k="${key}" data-u="${unit}" data-m="${mul}"></div>`;
}
function selectCtl(label,key,opts,cur){
  return `<div class="ctl"><div class="ctl-head"><span class="ctl-label">${label}</span></div>
    <select class="sel" data-sk="${key}">${opts.map((o,i)=>`<option value="${i}" ${i===cur?'selected':''}>${o}</option>`).join('')}</select></div>`;
}
function gToggle(label,key){return `<div class="ctl"><div class="toggle-row"><span class="ctl-label">${label}</span>
  <button class="switch ${G[key]?'on':''}" data-gt="${key}"></button></div></div>`;}

function gradBar(){
  const st=sortedStops();
  const css=`linear-gradient(90deg,${st.map(s=>`${s.c} ${(s.p*100).toFixed(1)}%`).join(',')})`;
  const stops=G.stops.map((s,i)=>`<div class="stop ${i===G.sel?'sel':''}" data-si="${i}" style="left:${s.p*100}%;background:${s.c}"></div>`).join('');
  const cur=G.stops[G.sel];
  return `<div class="gradbar-wrap">
    <div class="gradbar" id="gradbar" style="background:${css}">${stops}</div>
    <div class="stop-tools">
      <div class="swatch-btn"><span class="chip" style="background:${cur.c}"></span>${cur.c}
        <input type="color" value="${cur.c}" id="stop-color"></div>
      <button class="mini-btn" id="stop-del">Remove</button>
    </div></div>
    <div class="hint">Drag stops · click bar to add (max 8) · click a stop to select</div>`;
}

function buildComposePanel(){
  let h='';
  h+=`<div class="grp"><div class="grp-title">Gradient</div>${gradBar()}
    ${selectCtl('Shape','shape',SHAPES,G.shape)}
    ${slider(G,'Angle','angle',0,360,1,'°')}
    ${slider(G,'Warp','warp',0,1,0.01)}
    ${slider(G,'Scale','scale',0.2,4,0.01)}
    ${slider(G,'Detail','detail',0,6,1)}
    ${slider(G,'Contrast','contrast',0.2,3,0.01)}</div>`;

  h+=`<div class="grp"><div class="grp-title">Blend over photo</div>
    ${selectCtl('Blend mode','blend',BLENDS,G.blend)}
    ${slider(G,'Opacity','opacity',0,1,0.01,'%',100)}
    ${slider(G,'Image blur','blur',0,1,0.01)}</div>`;

  h+=`<div class="grp"><div class="grp-title">Optics</div>
    ${slider(G,'Aberration','aberration',0,2,0.01)}
    ${slider(G,'Softness','softness',0,1,0.01)}
    ${slider(G,'Grain','grain',0,0.3,0.005)}</div>`;

  h+=`<div class="grp"><div class="grp-title">Glass</div>
    ${selectCtl('Mode','glass',GLASS,G.glass)}
    ${G.glass?slider(G,'Amount','glassAmt',0,1,0.01):''}</div>`;

  h+=`<div class="grp"><button class="top-btn" style="width:100%" id="send-dither">↓ Send result to Reduce</button>
    <div class="hint" style="margin-top:10px">Compositor WebGL original · procesado en tu navegador.</div></div>`;
  panel.innerHTML=h;
  wireCompose();
}

function wireCompose(){
  panel.querySelectorAll('input[type=range]').forEach(r=>r.addEventListener('input',()=>{
    const o=r.dataset.o==='G'?G:S;o[r.dataset.k]=+r.value;
    const mul=+r.dataset.m||1;const val=(+r.value)*mul;
    const el=document.getElementById('v-'+r.dataset.k);if(el)el.textContent=((r.step<1||mul!==1)?val.toFixed(2):Math.round(val))+(r.dataset.u||'');
    if(r.dataset.k==='blur'||r.dataset.k==='softness'){if(PHOTO)uploadPhoto(PHOTO);}
    glRender();
  }));
  panel.querySelectorAll('[data-sk]').forEach(s=>s.addEventListener('change',()=>{
    G[s.dataset.sk]=+s.value;buildComposePanel();glRender();}));
  panel.querySelectorAll('[data-gt]').forEach(b=>b.addEventListener('click',()=>{
    G[b.dataset.gt]=!G[b.dataset.gt];b.classList.toggle('on');glRender();}));
  // stops
  panel.querySelectorAll('.stop').forEach(s=>{
    s.addEventListener('pointerdown',e=>{e.preventDefault();G.sel=+s.dataset.si;buildComposePanel();
      const bar=document.getElementById('gradbar');const r=bar.getBoundingClientRect();
      const move=ev=>{let p=clamp((ev.clientX-r.left)/r.width,0,1);G.stops[G.sel].p=p;
        s.style.left=p*100+'%';document.getElementById('gradbar').style.background=
          `linear-gradient(90deg,${sortedStops().map(x=>`${x.c} ${(x.p*100).toFixed(1)}%`).join(',')})`;glRender();};
      const up=()=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);buildComposePanel();};
      window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);});
  });
  const bar=document.getElementById('gradbar');
  if(bar)bar.addEventListener('click',e=>{
    if(e.target.classList.contains('stop'))return;if(G.stops.length>=8){toast('Max 8 stops');return;}
    const r=bar.getBoundingClientRect();const p=clamp((e.clientX-r.left)/r.width,0,1);
    G.stops.push({c:sampleGrad(p),p});G.sel=G.stops.length-1;buildComposePanel();glRender();});
  const col=document.getElementById('stop-color');
  if(col)col.addEventListener('input',()=>{G.stops[G.sel].c=col.value;buildComposePanel();glRender();});
  const del=document.getElementById('stop-del');
  if(del)del.addEventListener('click',()=>{if(G.stops.length<=2){toast('Need ≥2 stops');return;}
    G.stops.splice(G.sel,1);G.sel=0;buildComposePanel();glRender();});
  const sd=document.getElementById('send-dither');
  if(sd)sd.addEventListener('click',sendToReduce);
}
function sampleGrad(p){const st=sortedStops();let a=st[0],b=st[st.length-1];
  for(let i=0;i<st.length-1;i++){if(p>=st[i].p&&p<=st[i+1].p){a=st[i];b=st[i+1];break;}}
  const f=(p-a.p)/Math.max(b.p-a.p,1e-4);const ca=hexRGB(a.c),cb=hexRGB(b.c);
  const m=ca.map((v,i)=>Math.round(v+(cb[i]-v)*f));
  return '#'+m.map(v=>clamp(v,0,255).toString(16).padStart(2,'0')).join('');}

/* ═══════════════ REDUCE engine (V1) ═══════════════ */
const S={img:null,style:'dither',ditherAlgo:'floyd',colorMode:'mono',levels:4,cell:5,
  contrast:100,brightness:100,saturation:100,hue:0,invert:false,ink:'#14141a',paper:'#f4f2ea',
  charset:' .:-=+*#%@',studs:false,angle:false};
const BAYER4=[[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]].map(r=>r.map(v=>(v+0.5)/16));
const BAYER8=(()=>{let m=[[0,2],[3,1]];const grow=b=>{const n=b.length*2,o=[];for(let y=0;y<n;y++){o[y]=[];
  for(let x=0;x<n;x++){const q=(x<b.length?0:1)+(y<b.length?0:2);o[y][x]=4*b[y%b.length][x%b.length]+q;}}return o;};
  m=grow(m);m=grow(m);return m.map(r=>r.map(v=>(v+0.5)/64));})();
const lum=(r,g,b)=>0.299*r+0.587*g+0.114*b;
function applyAdjust(d){const c=S.contrast/100,br=S.brightness/100,sat=S.saturation/100,hue=S.hue*Math.PI/180;
  const cs=Math.cos(hue),sn=Math.sin(hue);const lr=0.213,lg=0.715,lb=0.072;
  const m=[lr+cs*(1-lr)+sn*(-lr),lg+cs*(-lg)+sn*(-lg),lb+cs*(-lb)+sn*(1-lb),
    lr+cs*(-lr)+sn*0.143,lg+cs*(1-lg)+sn*0.140,lb+cs*(-lb)+sn*(-0.283),
    lr+cs*(-lr)+sn*(-(1-lr)),lg+cs*(-lg)+sn*lg,lb+cs*(1-lb)+sn*lb];
  for(let i=0;i<d.length;i+=4){let r=d[i],g=d[i+1],b=d[i+2];
    if(sat!==1){const L=lum(r,g,b);r=L+(r-L)*sat;g=L+(g-L)*sat;b=L+(b-L)*sat;}
    if(hue!==0){const nr=r*m[0]+g*m[1]+b*m[2],ng=r*m[3]+g*m[4]+b*m[5],nb=r*m[6]+g*m[7]+b*m[8];r=nr;g=ng;b=nb;}
    r=(r-128)*c+128;g=(g-128)*c+128;b=(b-128)*c+128;r*=br;g*=br;b*=br;
    if(S.invert){r=255-r;g=255-g;b=255-b;}
    d[i]=clamp(r,0,255);d[i+1]=clamp(g,0,255);d[i+2]=clamp(b,0,255);}}
function gridBuffer(gw,gh){const off=document.createElement('canvas');off.width=gw;off.height=gh;
  const oc=off.getContext('2d',{willReadFrequently:true});oc.imageSmoothingEnabled=true;
  if(S.img)oc.drawImage(S.img,0,0,gw,gh);else demoRamp(oc,gw,gh);
  const id=oc.getImageData(0,0,gw,gh);applyAdjust(id.data);return id;}
function demoRamp(ctx,w,h){const g=ctx.createImageData(w,h);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){const i=(y*w+x)*4;const rad=Math.hypot(x/w-0.62,y/h-0.4);
    let v=255*(1-clamp(rad*1.35,0,1));v=v*0.8+255*0.2*(x/w);g.data[i]=g.data[i+1]=g.data[i+2]=clamp(v,0,255);g.data[i+3]=255;}
  ctx.putImageData(g,0,0);}
const quant=(v,n)=>Math.round((v/255)*(n-1))/(n-1)*255;
function renderDither(w,h){const gw=Math.max(1,Math.round(w/S.cell)),gh=Math.max(1,Math.round(h/S.cell));
  const id=gridBuffer(gw,gh),d=id.data;
  if(S.colorMode==='mono'){const g=new Float32Array(gw*gh);
    for(let i=0,j=0;i<d.length;i+=4,j++)g[j]=lum(d[i],d[i+1],d[i+2]);diffuseMono(g,gw,gh);
    const ink=hexRGB(S.ink),pap=hexRGB(S.paper);

function diffuseMono(g,w,h){const A=S.ditherAlgo;

function paintGrid(id,gw,gh,w,h){const tmp=document.createElement('canvas');tmp.width=gw;tmp.height=gh;

const fxC=(w,h)=>{const c=document.createElement('canvas');c.width=w;c.height=h;return c;};

  const c=fxClone(s);const x=c.getContext('2d');const out=x.getImageData(0,0,w,h);const d=out.data;
  for(let y=1;y<h-1;y++)for(let xx=1;xx<w-1;xx++){const i=(y*w+xx)*4;
    for(let ch=0;ch<3;ch++){let v=0,ki=0;
      for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){v+=sc[((y+dy)*w+(xx+dx))*4+ch]*k[ki++];}

  for(let y=0;y<h;y++)for(let xx=0;xx<w;xx++){const i=(y*w+xx)*4;const m=fn(xx/(w-1),y/(h-1));
    let sx=Math.round(m[0]*(w-1)),sy=Math.round(m[1]*(h-1));
    sx=clamp(sx,0,w-1);sy=clamp(sy,0,h-1);
    const j=(sy*w+sx)*4;d[i]=sd[j];d[i+1]=sd[j+1];d[i+2]=sd[j+2];d[i+3]=255;}

  const q=l<0.5?l*(1+s):l+s-l*s,p=2*l-q;

  r=hue(p,q,h+1/3);g=hue(p,q,h);b=hue(p,q,h-1/3);}
  return[r*255,g*255,b*255];}

/* ── Curvas: Catmull-Rom → LUT ── */
function curveLUT(pts,n){n=n||256;const P=[...pts].sort((a,b)=>a[0]-b[0]);
  const lut=new Float32Array(n);
  const get=i=>P[clamp(i,0,P.length-1)];
  for(let i=0;i<n;i++){const t=i/(n-1);
    let k=0;while(k<P.length-1&&P[k+1][0]<t)k++;
    if(t<=P[0][0]){lut[i]=P[0][1];continue;}
    if(t>=P[P.length-1][0]){lut[i]=P[P.length-1][1];continue;}
    const p0=get(k-1),p1=get(k),p2=get(k+1),p3=get(k+2);
    const span=p2[0]-p1[0]||1e-6,u=(t-p1[0])/span,u2=u*u,u3=u2*u;
    const y=0.5*((2*p1[1])+(-p0[1]+p2[1])*u+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*u2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*u3);
    lut[i]=clamp(y,0,1);}
  return lut;}

 'Nokia 3310':{stack:[['pixelate',100,{cell:9}],['duotonefx',100,{dark:'#43523d',light:'#c7f0d8'}],['thresholdfx',70,{lvl:128,soft:6}]]},
 'Grunge dither':{stack:[['contrastfx',100,{c:130}],['ditherfx',80,{cell:2}],['paper',70,{fiber:65,crump:55}],['grain',45,{}]]},
};

function fxNewLayer(type,strength,overrides){
  const def=FX_DEFS[type];if(!def)return null;
  const p={};def.params.forEach(([k,,,,,dv])=>p[k]=dv);def.colors.forEach(([k,,dv])=>p[k]=dv);
  (def.texts||[]).forEach(([k,,dv])=>p[k]=dv);
  if(def.init)def.init(p);
  Object.assign(p,overrides||{});
  return{id:FX.uid++,type,s:strength==null?100:strength,on:true,open:false,p};}
function fxLoadPreset(name){const pr=FX_PRESETS[name];if(!pr)return;
  FX.stack=pr.stack.map(([t,s,o])=>fxNewLayer(t,s,o));FX.preset=name;
  buildFxPanel();fxRender();toast(name);}

/* ── Fuente + render ── */
const FXDEMO=new Image();
FXDEMO.src='assets/fx/demo.jpg?v=20260717a';
FXDEMO.onload=()=>{if(MODE==='effects'&&!PHOTO)fxRender();};
function fxSource(){let w,h;
  const SRC=PHOTO||(FXDEMO.complete&&FXDEMO.naturalWidth?FXDEMO:null);
  if(SRC){w=SRC.naturalWidth;h=SRC.naturalHeight;
    const sc=Math.min(1,FX_MAX/Math.max(w,h));w=Math.round(w*sc);h=Math.round(h*sc);}
  else{w=880;h=560;}
  const c=fxC(w,h);const x=c.getContext('2d');
  const SRC2=PHOTO||(FXDEMO.complete&&FXDEMO.naturalWidth?FXDEMO:null);
  if(SRC2){x.drawImage(SRC2,0,0,w,h);}
  else{const g=x.createLinearGradient(0,0,w,h);
    g.addColorStop(0,'#6c5ce7');g.addColorStop(0.5,'#fd79a8');g.addColorStop(1,'#ffe08a');
    x.fillStyle=g;x.fillRect(0,0,w,h);
    x.fillStyle='rgba(10,10,12,0.85)';x.beginPath();x.arc(w*0.62,h*0.45,h*0.28,0,6.2832);x.fill();
    x.fillStyle='#f4f2ea';x.font='600 90px Inter,system-ui,sans-serif';x.fillText('Aa',w*0.16,h*0.62);}
  return c;}
function fxRender(){if(MODE!=='effects')return;if(fxRAF)return;
  fxRAF=requestAnimationFrame(()=>{fxRAF=null;_fxRender();});}
function _fxRender(){let cur=fxSource();
  for(const L of FX.stack){if(!L.on)continue;let out;
    try{out=FX_DEFS[L.type].apply(cur,L.p);}catch(e){continue;}
    if(L.s>=100){cur=out;}
    else{const m=fxClone(cur);const x=m.getContext('2d');
      x.globalAlpha=L.s/100;x.drawImage(out,0,0,cur.width,cur.height);x.globalAlpha=1;cur=m;}}
  fxview.width=cur.width;fxview.height=cur.height;fxctx.drawImage(cur,0,0);
  document.getElementById('hud-b').textContent=cur.width+'×'+cur.height+' · '+FX.stack.filter(l=>l.on).length+' fx';}

/* ═══════════ Browser (carril izquierdo) ═══════════ */
function fxHue(name){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0;return h%360;}
function fxThumb(id,name,preset){
  const h=fxHue(name);
  const grad=`linear-gradient(135deg,hsl(${h},42%,26%),hsl(${(h+55)%360},48%,14%))`;
  const src=preset?`assets/fx/p-${id}.jpg`:`assets/fx/${id}.jpg`;
  return `<div class="fxb-thumb" style="background:${grad}"><img src="${src}" loading="lazy" alt="" onerror="this.style.display='none'"><span class="fxb-ph">${name.slice(0,2)}</span></div>`;}
function buildFxBrowser(){
  const q=FX.q.toLowerCase();
  let h=`<div class="fxb">
    <div class="fxb-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
      <input id="fxb-q" placeholder="Search" value="${FX.q.replace(/"/g,'&quot;')}" spellcheck="false"></div>
    <div class="fxb-tabs">
      <button class="${FX.tab==='explore'?'active':''}" data-fxtab="explore">Explore</button>
      <button class="${FX.tab==='presets'?'active':''}" data-fxtab="presets">Presets</button></div>
    <div class="fxb-list">`;
  if(FX.tab==='presets'){
    const items=Object.keys(FX_PRESETS).filter(n=>!q||n.toLowerCase().includes(q));
    h+=`<div class="fxb-cat">Presets</div><div class="fxb-grid">`;
    items.forEach(n=>{const slug=n.toLowerCase().replace(/[^a-z0-9]+/g,'-');
      h+=`<button class="fxb-card" data-fxpr="${n}">${fxThumb(slug,n,true)}<span class="fxb-name">${n}</span></button>`;});
    h+=`</div>`;
    if(!items.length)h+=`<div class="hint" style="padding:12px">Sin resultados.</div>`;
  }else{
    FX_CATS.forEach(cat=>{
      const items=Object.entries(FX_DEFS).filter(([id,d])=>d.cat===cat&&(!q||d.name.toLowerCase().includes(q)));
      if(!items.length)return;
      h+=`<div class="fxb-cat">${cat}</div><div class="fxb-grid">`;
      items.forEach(([id,d])=>{h+=`<button class="fxb-card" data-fxadd="${id}">${fxThumb(id,d.name)}<span class="fxb-name">${d.name}</span></button>`;});
      h+=`</div>`;});
    if(q&&!FX_CATS.some(cat=>Object.values(FX_DEFS).some(d=>d.cat===cat&&d.name.toLowerCase().includes(q))))
      h+=`<div class="hint" style="padding:12px">Sin resultados.</div>`;
  }
  h+=`</div></div>`;
  rail.innerHTML=h;
  const qi=document.getElementById('fxb-q');
  qi.addEventListener('input',()=>{FX.q=qi.value;const pos=qi.selectionStart;buildFxBrowser();
    const nq=document.getElementById('fxb-q');nq.focus();nq.setSelectionRange(pos,pos);});
  rail.querySelectorAll('[data-fxtab]').forEach(b=>b.addEventListener('click',()=>{FX.tab=b.dataset.fxtab;buildFxBrowser();}));
  rail.querySelectorAll('[data-fxadd]').forEach(b=>b.addEventListener('click',()=>{
    const L=fxNewLayer(b.dataset.fxadd);L.open=true;FX.stack.push(L);
    buildFxPanel();fxRender();toast(FX_DEFS[b.dataset.fxadd].name);}));
  rail.querySelectorAll('[data-fxpr]').forEach(b=>b.addEventListener('click',()=>fxLoadPreset(b.dataset.fxpr)));
}

/* ═══════════ Panel derecho: layers/stack ═══════════ */
const FX_EYE='<svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>';
const FX_X='<svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>';
const FX_UP='<svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>';
const FX_DN='<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg>';
function curveCanvasHTML(L,ch,label){
  return `<div class="ctl"><div class="ctl-head"><span class="ctl-label">${label}</span>
    <button class="mini-btn" data-cvreset="${L.id}|${ch}">Reset</button></div>
    <canvas class="curvecv" width="252" height="120" data-cv="${L.id}|${ch}"></canvas></div>`;}
function buildFxPanel(){
  let h=`<div class="grp"><div class="grp-title">Layers${FX.preset?' · '+FX.preset:''}</div>`;
  if(!FX.stack.length)h+=`<div class="hint">Sin filtros. Elige un efecto o preset del panel izquierdo.</div>`;
  FX.stack.forEach((L,idx)=>{const def=FX_DEFS[L.type];
    h+=`<div class="fxl ${L.on?'':'off'} ${L.open?'open':''}" data-lid="${L.id}">
      <div class="fxl-head" data-fxhead="${L.id}">
        <span class="fxl-name">${def.name}</span>
        <button class="fxl-ico" data-fxup="${L.id}" title="Subir" ${idx===0?'style="opacity:.25;pointer-events:none"':''}>${FX_UP}</button>
        <button class="fxl-ico" data-fxdn="${L.id}" title="Bajar" ${idx===FX.stack.length-1?'style="opacity:.25;pointer-events:none"':''}>${FX_DN}</button>
        <button class="fxl-ico eye ${L.on?'on':''}" data-fxeye="${L.id}" title="Mostrar/ocultar">${FX_EYE}</button>
        <button class="fxl-ico del" data-fxdel="${L.id}" title="Eliminar">${FX_X}</button>
      </div>
      <div class="fxl-body">
        <div class="fxl-strength"><span class="ctl-label">Strength</span>
          <input type="range" min="0" max="100" step="1" value="${L.s}" data-fxs="${L.id}">
          <span class="ctl-val" id="fxsv-${L.id}">${L.s}%</span></div>`;
    if(def.custom==='curves'){
      h+=`<div class="ctl"><div class="ctl-head"><span class="ctl-label">Apply mode</span></div>
        <div class="cvmodes" data-cvmodes="${L.id}">
          <button class="${L.p.mode==='n'?'active':''}" data-m="n" title="Normal">N</button>
          <button class="${L.p.mode==='c'?'active':''}" data-m="c" title="Color">C</button>
          <button class="${L.p.mode==='l'?'active':''}" data-m="l" title="Luminosity">L</button>
        </div></div>`;
      h+=curveCanvasHTML(L,'m','RGB curve')+curveCanvasHTML(L,'r','Red channel')+curveCanvasHTML(L,'g','Green channel')+curveCanvasHTML(L,'b','Blue channel');}
    if(def.custom==='huecurve'){
      h+=curveCanvasHTML(L,'hc','Hue shift');}
    def.params.forEach(([k,label,min,max,step,,unit])=>{
      h+=`<div class="ctl"><div class="ctl-head"><span class="ctl-label">${label}</span>
        <span class="ctl-val" id="fxv-${L.id}-${k}">${L.p[k]}${unit}</span></div>
        <input type="range" min="${min}" max="${max}" step="${step}" value="${L.p[k]}" data-fxp="${L.id}" data-fxk="${k}" data-u="${unit}"></div>`;});
    (def.texts||[]).forEach(([k,label])=>{
      h+=`<div class="ctl"><div class="ctl-head"><span class="ctl-label">${label}</span></div>
        <input class="charset-input" value="${(L.p[k]||'').replace(/"/g,'&quot;')}" data-fxt="${L.id}" data-fxk="${k}" spellcheck="false"></div>`;});
    if(def.colors.length){h+=`<div class="ctl"><div class="swatches">`;
      def.colors.forEach(([k,label])=>{
        h+=`<div class="swatch"><label>${label}</label><div class="swatch-btn">
          <span class="chip" style="background:${L.p[k]}"></span>${L.p[k]}
          <input type="color" value="${L.p[k]}" data-fxc="${L.id}" data-fxk="${k}"></div></div>`;});
      h+=`</div></div>`;}
    h+=`</div></div>`;});
  h+=`</div>`;
  h+=`<div class="grp"><div class="grp-title">Send to</div>
    <div style="display:flex;gap:8px">
      <button class="mini-btn" id="fx-send-compose" style="flex:1;padding:10px 0">→ Compose</button>
      <button class="mini-btn" id="fx-send-reduce" style="flex:1;padding:10px 0">→ Reduce</button>
    </div></div>`;
  h+=`<div class="grp"><div class="hint">Los filtros se aplican de arriba hacia abajo. Strength mezcla cada capa con el resultado anterior. Miniaturas: sube <b>assets/fx/&lt;id&gt;.jpg</b> (efectos) o <b>assets/fx/p-&lt;preset&gt;.jpg</b> y aparecerán solas.</div></div>`;
  panel.innerHTML=h;wireFx();}
const fxById=id=>FX.stack.find(l=>l.id===+id);

/* ── Editor de curvas ── */
function drawCurve(cv){
  const[lid,ch]=cv.dataset.cv.split('|');const L=fxById(lid);if(!L)return;
  const pts=L.p[ch];const x=cv.getContext('2d');const W=cv.width,H=cv.height;
  x.clearRect(0,0,W,H);
  x.fillStyle='rgba(255,255,255,0.03)';x.fillRect(0,0,W,H);
  x.strokeStyle='rgba(255,255,255,0.08)';x.lineWidth=1;
  for(let i=1;i<4;i++){x.beginPath();x.moveTo(W*i/4,0);x.lineTo(W*i/4,H);x.stroke();
    x.beginPath();x.moveTo(0,H*i/4);x.lineTo(W,H*i/4);x.stroke();}
  x.strokeStyle='rgba(255,255,255,0.12)';x.beginPath();x.moveTo(0,H);x.lineTo(W,0);x.stroke();
  const col=ch==='r'?'#ff6b5c':ch==='g'?'#4ade80':ch==='b'?'#60a5fa':ch==='hc'?'#e879f9':'#e8e6df';
  const lut=curveLUT(pts,W);
  x.strokeStyle=col;x.lineWidth=1.8;x.beginPath();
  for(let i=0;i<W;i++){const y=H-lut[i]*H;i===0?x.moveTo(i,y):x.lineTo(i,y);}
  x.stroke();
  pts.forEach(p=>{x.fillStyle=col;x.beginPath();x.arc(p[0]*W,H-p[1]*H,4.5,0,6.2832);x.fill();
    x.strokeStyle='#0a0a0c';x.lineWidth=1.5;x.stroke();});}
function wireCurve(cv){
  const[lid,ch]=cv.dataset.cv.split('|');
  let drag=-1;
  const pos=e=>{const r=cv.getBoundingClientRect();
    return[clamp((e.clientX-r.left)/r.width,0,1),clamp(1-(e.clientY-r.top)/r.height,0,1)];};
  cv.addEventListener('pointerdown',e=>{const L=fxById(lid);if(!L)return;
    const[px,py]=pos(e);const pts=L.p[ch];
    let best=-1,bd=0.08;
    pts.forEach((p,i)=>{const d=Math.hypot(p[0]-px,p[1]-py);if(d<bd){bd=d;best=i;}});
    if(best<0){pts.push([px,py]);pts.sort((a,b)=>a[0]-b[0]);best=pts.findIndex(p=>p[0]===px&&p[1]===py);}
    drag=best;cv.setPointerCapture(e.pointerId);drawCurve(cv);fxRender();});
  cv.addEventListener('pointermove',e=>{if(drag<0)return;const L=fxById(lid);if(!L)return;
    const pts=L.p[ch];const[px,py]=pos(e);
    const minX=drag>0?pts[drag-1][0]+0.01:0;
    const maxX=drag<pts.length-1?pts[drag+1][0]-0.01:1;
    pts[drag]=[drag===0?0:drag===pts.length-1?1:clamp(px,minX,maxX),py];
    drawCurve(cv);fxRender();});
  cv.addEventListener('pointerup',()=>{drag=-1;});
  cv.addEventListener('dblclick',e=>{const L=fxById(lid);if(!L)return;
    const pts=L.p[ch];if(pts.length<=2)return;
    const[px,py]=pos(e);
    let best=-1,bd=0.08;
    pts.forEach((p,i)=>{const d=Math.hypot(p[0]-px,p[1]-py);if(d<bd){bd=d;best=i;}});
    if(best>0&&best<pts.length-1){pts.splice(best,1);drawCurve(cv);fxRender();}});}

function wireFx(){
  panel.querySelectorAll('[data-fxhead]').forEach(el=>el.addEventListener('click',e=>{
    if(e.target.closest('.fxl-ico'))return;
    const L=fxById(el.dataset.fxhead);L.open=!L.open;buildFxPanel();}));
  panel.querySelectorAll('[data-fxeye]').forEach(b=>b.addEventListener('click',()=>{
    const L=fxById(b.dataset.fxeye);L.on=!L.on;buildFxPanel();fxRender();}));
  panel.querySelectorAll('[data-fxdel]').forEach(b=>b.addEventListener('click',()=>{
    FX.stack=FX.stack.filter(l=>l.id!==+b.dataset.fxdel);if(!FX.stack.length)FX.preset=null;
    buildFxPanel();fxRender();}));
  panel.querySelectorAll('[data-fxup]').forEach(b=>b.addEventListener('click',()=>{
    const i=FX.stack.findIndex(l=>l.id===+b.dataset.fxup);
    if(i>0){[FX.stack[i-1],FX.stack[i]]=[FX.stack[i],FX.stack[i-1]];buildFxPanel();fxRender();}}));
  panel.querySelectorAll('[data-fxdn]').forEach(b=>b.addEventListener('click',()=>{
    const i=FX.stack.findIndex(l=>l.id===+b.dataset.fxdn);
    if(i<FX.stack.length-1){[FX.stack[i+1],FX.stack[i]]=[FX.stack[i],FX.stack[i+1]];buildFxPanel();fxRender();}}));
  panel.querySelectorAll('[data-fxs]').forEach(r=>r.addEventListener('input',()=>{
    const L=fxById(r.dataset.fxs);L.s=+r.value;
    document.getElementById('fxsv-'+L.id).textContent=L.s+'%';fxRender();}));
  panel.querySelectorAll('[data-fxp]').forEach(r=>r.addEventListener('input',()=>{
    const L=fxById(r.dataset.fxp);L.p[r.dataset.fxk]=+r.value;
    document.getElementById('fxv-'+L.id+'-'+r.dataset.fxk).textContent=r.value+(r.dataset.u||'');fxRender();}));
  panel.querySelectorAll('[data-fxt]').forEach(inp=>inp.addEventListener('input',()=>{
    const L=fxById(inp.dataset.fxt);L.p[inp.dataset.fxk]=inp.value;fxRender();}));
  panel.querySelectorAll('[data-fxc]').forEach(inp=>inp.addEventListener('input',()=>{
    const L=fxById(inp.dataset.fxc);L.p[inp.dataset.fxk]=inp.value;
    inp.parentElement.querySelector('.chip').style.background=inp.value;
    [...inp.parentElement.childNodes].forEach(n=>{if(n.nodeType===3&&n.textContent.trim())n.textContent=inp.value;});
    fxRender();}));
  panel.querySelectorAll('[data-cvmodes]').forEach(box=>box.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
    const L=fxById(box.dataset.cvmodes);L.p.mode=b.dataset.m;
    box.querySelectorAll('button').forEach(x=>x.classList.toggle('active',x===b));fxRender();})));
  panel.querySelectorAll('[data-cvreset]').forEach(b=>b.addEventListener('click',()=>{
    const[lid,ch]=b.dataset.cvreset.split('|');const L=fxById(lid);if(!L)return;
    L.p[ch]=ch==='hc'?[[0,0.5],[0.5,0.5],[1,0.5]]:[[0,0],[1,1]];
    buildFxPanel();fxRender();}));
  panel.querySelectorAll('.curvecv').forEach(cv=>{drawCurve(cv);wireCurve(cv);});
  const sc=document.getElementById('fx-send-compose');
  if(sc)sc.addEventListener('click',()=>fxSendTo('compose'));
  const sr=document.getElementById('fx-send-reduce');
  if(sr)sr.addEventListener('click',()=>fxSendTo('reduce'));}
function fxSendTo(mode){_fxRender();
  fxview.toBlob(blob=>{const img=new Image();img.onload=()=>{
    PHOTO=img;S.img=img;setMode(mode);
    toast('Sent to <b>'+(mode==='compose'?'Compose':'Reduce')+'</b>');};
    img.src=URL.createObjectURL(blob);},'image/png');}

function setMode(m){

  if(G.animate&&!animRAF)animRAF=requestAnimationFrame(animLoop);});

/* ═══════════════ Reset all ═══════════════ */
const G_DEFAULTS={shape:0,angle:19,scale:1.66,warp:0.43,detail:2,contrast:1.14,opacity:0.85,blend:3,aberration:0.38,softness:0,grain:0.06,blur:0,glass:0,glassAmt:0.5,animate:false,time:0};
const S_DEFAULTS={style:'dither',ditherAlgo:'floyd',colorMode:'mono',levels:4,cell:5,contrast:100,brightness:100,saturation:100,hue:0,invert:false,ink:'#14141a',paper:'#f4f2ea',charset:' .:-=+*#%@',studs:false,angle:false};
document.getElementById('btn-reset-all').addEventListener('click',()=>{
  if(MODE==='compose'){
    Object.assign(G,G_DEFAULTS);
    const iris=GRAD_PRESETS['Iris'];
    G.stops=iris.stops.map(([c,p])=>({c,p}));G.sel=0;
    G.shape=iris.shape;G.angle=iris.angle;G.warp=iris.warp;G.scale=iris.scale;G.detail=iris.detail;G.contrast=iris.contrast;G.animate=false;
    document.getElementById('btn-animate').classList.remove('on');
    if(animRAF){cancelAnimationFrame(animRAF);animRAF=null;}
    buildComposePanel();glRender();
  }else if(MODE==='effects'){
    FX.stack=[];FX.preset=null;buildFxPanel();fxRender();
  }else{
    Object.assign(S,S_DEFAULTS);
    buildReducePanel();render();
  }
  toast('Settings reset');
});
// mostrar/ocultar reset según modo
const _origSetMode=setMode;

/* ═══════════════ Scroll zoom (parallax) ═══════════════ */
let _zoom=1.0;
stage.addEventListener('wheel',e=>{
  e.preventDefault();
  _zoom=Math.min(3,Math.max(0.4,_zoom-e.deltaY*0.0012));
  const wrap=document.querySelector('.canvas-wrap');
  wrap.style.transform=`scale(${_zoom})`;
  wrap.style.transformOrigin='center center';
  wrap.style.transition='transform .12s cubic-bezier(.25,.46,.45,.94)';
},{passive:false});
// doble click para reset zoom
stage.addEventListener('dblclick',()=>{
  _zoom=1;
  const wrap=document.querySelector('.canvas-wrap');
  wrap.style.transform='scale(1)';
  toast('Zoom reset');
});

/* ═══════════════ BANNER mode (Canvas 2D layout tool) ═══════════════ */
const B={
  format:'hero',            // hero 1920x600 | square 1080 | story 1080x1920 | wide 1200x628
  layout:'split-left',      // split-left | split-right | centered | overlay
  brand:'Luminarc',
  tagline:'Líder Mundial en Vajilla · Hecho en Francia',
  badge:'20%',
  badgeLabel:'Hasta',
  badgeSub:'dcto.',
  headline:'Hasta 20% de descuento',
  sub:'En selección de productos.\nSolo hasta agotar stock',
  features:'Despachos a todo el Perú · Vidrio de Alta Calidad · Hecho en Francia',
  cta:'¡Lo quiero!',
  disclaimer:'Promociones sujetas a cambios y stock.',
  bg:'#123a8f', accent:'#ffd400', text:'#ffffff', ctaBg:'#0a2a6b',
  img:null,
  showBadge:true, showFeatures:true, showCta:true,
};
const B_FORMATS={hero:[1920,600],wide:[1200,628],square:[1080,1080],story:[1080,1920]};
const B_TEMPLATES={
  'Vajilla':   {bg:'#123a8f',accent:'#ffd400',text:'#ffffff',ctaBg:'#0a2a6b',layout:'split-left'},
  'Esmeralda': {bg:'#0b3d2e',accent:'#f5c451',text:'#ffffff',ctaBg:'#06281e',layout:'split-left'},
  'Coral':     {bg:'#b8324a',accent:'#ffe08a',text:'#ffffff',ctaBg:'#7d1f31',layout:'split-right'},
  'Grafito':   {bg:'#16161a',accent:'#ff5c38',text:'#f4f2ea',ctaBg:'#000000',layout:'split-left'},
  'Marfil':    {bg:'#f4f0e6',accent:'#123a8f',text:'#16161a',ctaBg:'#123a8f',layout:'split-right'},
  'Uva':       {bg:'#3d1a5b',accent:'#f5a3ff',text:'#ffffff',ctaBg:'#25103a',layout:'centered'},
  'Océano':    {bg:'#0369a1',accent:'#caf0f8',text:'#ffffff',ctaBg:'#023047',layout:'split-left'},
  'Cobre':     {bg:'#7c2d12',accent:'#fbbf24',text:'#fff7ed',ctaBg:'#451a03',layout:'split-right'},
};
function roundRect(c,x,y,w,h,r){r=Math.min(r,w/2,h/2);c.beginPath();c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function wrapText(c,text,x,y,maxW,lh){
  const paras=text.split('\n');let yy=y;
  for(const para of paras){
    const words=para.split(' ');let line='';
    for(const w of words){const test=line?line+' '+w:w;
      if(c.measureText(test).width>maxW&&line){c.fillText(line,x,yy);line=w;yy+=lh;}else line=test;}
    if(line){c.fillText(line,x,yy);yy+=lh;}
  }
  return yy;
}
function bRender(){
  return; // Banner retirado
  const [W,H]=B_FORMATS[B.format];
  bannerview.width=W;bannerview.height=H;
  const c=bctx;
  c.clearRect(0,0,W,H);
  c.fillStyle=B.bg;c.fillRect(0,0,W,H);
  const isVert=H>W;
  // zona texto / imagen según layout
  let textX, textW, imgX, imgW;
  const pad=W*0.045;
  if(B.layout==='centered'||B.layout==='overlay'){textX=pad;textW=W-pad*2;imgX=0;imgW=W;}
  else if(B.layout==='split-right'){textX=W*0.52+pad;textW=W*0.48-pad*1.5;imgX=0;imgW=W*0.52;}
  else {textX=pad;textW=W*0.48-pad*0.5;imgX=W*0.5;imgW=W*0.5;} // split-left
  const splitVert=isVert&&(B.layout==='split-left'||B.layout==='split-right');
  if(splitVert){imgX=0;imgW=W;textX=pad;textW=W-pad*2;}
  // imagen
  if(B.img){
    let ix=imgX,iy=0,iw=imgW,ih=H;
    if(B.layout==='overlay'){ix=0;iw=W;}
    if(splitVert){iy=H*0.42;ih=H*0.58;}
    c.save();roundRect(c,ix,iy,iw,ih,0);c.clip();
    const ar=B.img.naturalWidth/B.img.naturalHeight, tar=iw/ih;
    let dw,dh,dx,dy;
    if(ar>tar){dh=ih;dw=ih*ar;dx=ix-(dw-iw)/2;dy=iy;}else{dw=iw;dh=iw/ar;dx=ix;dy=iy-(dh-ih)/2;}
    c.drawImage(B.img,dx,dy,dw,dh);
    if(B.layout==='overlay'){c.fillStyle='rgba(0,0,0,.45)';c.fillRect(0,0,W,H);}
    c.restore();
  }else{
    // placeholder de imagen
    let ix=imgX,iy=0,iw=imgW,ih=H;
    if(splitVert){iy=H*0.42;ih=H*0.58;}
    if(B.layout!=='overlay'&&B.layout!=='centered'){
      c.fillStyle='rgba(255,255,255,.06)';c.fillRect(ix,iy,iw,ih);
      c.fillStyle='rgba(255,255,255,.35)';c.font=`${W*0.014}px 'Geist Mono',monospace`;c.textAlign='center';
      c.fillText('Drop product image here',ix+iw/2,iy+ih/2);c.textAlign='left';
    }
  }
  const cx=B.layout==='centered'?W/2:textX;
  c.textAlign=B.layout==='centered'?'center':'left';
  const S1=W/1920; // escala relativa al hero
  // brand
  c.fillStyle=B.text;c.font=`700 ${W*0.075}px 'Clash Display','Inter',sans-serif`;
  let yy=H*0.16;
  c.fillText(B.brand,cx,yy);
  // tagline
  yy+=W*0.032;
  c.fillStyle=B.text;c.font=`500 ${W*0.017}px 'Inter',sans-serif`;c.globalAlpha=.92;
  c.fillText(B.tagline,cx,yy);c.globalAlpha=1;
  // badge + headline
  yy+=H*0.13;
  let hlX=cx;
  if(B.showBadge&&B.layout!=='centered'){
    const bw=W*0.11,bh=bw*0.62,bx=cx,by=yy-bh*0.72;
    c.fillStyle=B.accent;roundRect(c,bx,by,bw,bh,W*0.008);c.fill();
    c.fillStyle=B.bg;c.textAlign='center';
    c.font=`600 ${bw*0.14}px 'Inter',sans-serif`;c.fillText(B.badgeLabel,bx+bw*0.5,by+bh*0.24);
    c.font=`700 ${bw*0.34}px 'Clash Display','Inter',sans-serif`;c.fillText(B.badge,bx+bw*0.5,by+bh*0.64);
    c.font=`600 ${bw*0.12}px 'Inter',sans-serif`;c.fillText(B.badgeSub,bx+bw*0.5,by+bh*0.9);
    c.textAlign='left';
    hlX=bx+bw+W*0.02;
  }
  c.fillStyle=B.text;c.font=`700 ${W*0.026}px 'Inter',sans-serif`;
  c.textAlign=B.layout==='centered'?'center':'left';
  let hy=B.layout==='centered'?yy+H*0.02:yy-H*0.03;
  hy=wrapText(c,B.headline,hlX,hy,textW-(hlX-cx),W*0.03);
  c.font=`400 ${W*0.016}px 'Inter',sans-serif`;c.globalAlpha=.85;
  wrapText(c,B.sub,hlX,hy+W*0.006,textW-(hlX-cx),W*0.022);c.globalAlpha=1;
  // features pills
  if(B.showFeatures){
    const feats=B.features.split('·').map(s=>s.trim()).filter(Boolean);
    let fx=cx,fy=H*0.68;c.font=`500 ${W*0.013}px 'Inter',sans-serif`;
    const startX=B.layout==='centered'?W/2 - (feats.reduce((a,f)=>a+c.measureText(f).width+W*0.05,0))/2 : cx;
    fx=startX;
    c.textAlign='left';
    for(const f of feats){
      const tw=c.measureText(f).width, pw=tw+W*0.028, ph=W*0.026;
      c.strokeStyle='rgba(255,255,255,.3)';c.lineWidth=1.5;
      c.fillStyle='rgba(255,255,255,.08)';roundRect(c,fx,fy,pw,ph,ph/2);c.fill();c.stroke();
      c.fillStyle=B.text;c.fillText(f,fx+W*0.014,fy+ph*0.66);
      fx+=pw+W*0.012;
      if(fx>textX+textW-W*0.1&&!isVert){fx=startX;fy+=ph+W*0.008;}
    }
  }
  // CTA
  if(B.showCta){
    c.font=`600 ${W*0.02}px 'Inter',sans-serif`;
    const tw=c.measureText(B.cta).width, bw=tw+W*0.06, bh=W*0.045;
    const bx=B.layout==='centered'?W/2-bw/2:(B.layout==='split-right'?textX:(isVert?cx:W*0.5+W*0.045));
    const by=isVert?H*0.9:H*0.78;
    c.fillStyle=B.ctaBg;roundRect(c,bx,by,bw,bh,bh/2);c.fill();
    c.fillStyle=B.text;c.textAlign='center';c.fillText('▸ '+B.cta,bx+bw/2,by+bh*0.64);c.textAlign='left';
  }
  // disclaimer
  if(B.disclaimer){c.fillStyle=B.text;c.globalAlpha=.7;c.font=`400 ${W*0.012}px 'Inter',sans-serif`;
    c.textAlign=B.layout==='centered'?'center':'left';
    c.fillText(B.disclaimer,cx,H*0.9);c.globalAlpha=1;}
  c.textAlign='left';
  document.getElementById('hud-a').textContent='BANNER · '+B.format.toUpperCase();
  document.getElementById('hud-b').textContent=W+'×'+H;
}

function bField(label,key,ph=''){return `<div class="ctl"><div class="ctl-head"><span class="ctl-label">${label}</span></div>
  <input class="charset-input" data-bk="${key}" value="${(B[key]||'').replace(/"/g,'&quot;').replace(/\n/g,' ⏎ ')}" placeholder="${ph}" spellcheck="false"></div>`;}
function bArea(label,key){return `<div class="ctl"><div class="ctl-head"><span class="ctl-label">${label}</span></div>
  <textarea class="charset-input" data-bk="${key}" rows="2" spellcheck="false" style="resize:vertical;line-height:1.4">${(B[key]||'')}</textarea></div>`;}
function bColor(label,key){return `<div class="swatch"><label>${label}</label><div class="swatch-btn"><span class="chip" style="background:${B[key]}"></span>${B[key]}<input type="color" value="${B[key]}" data-bc="${key}"></div></div>`;}
function bToggle(label,key){return `<div class="ctl"><div class="toggle-row"><span class="ctl-label">${label}</span><button class="switch ${B[key]?'on':''}" data-btk="${key}"></button></div></div>`;}

function buildBannerPanel(){
  let h='';
  h+=`<div class="grp"><div class="grp-title">Format</div>
    <div class="pills">${Object.keys(B_FORMATS).map(f=>`<button class="pill ${B.format===f?'active':''}" data-bfmt="${f}">${f}</button>`).join('')}</div>
    <div class="ctl-head" style="margin-top:12px"><span class="ctl-label">Layout</span></div>
    <div class="pills">${['split-left','split-right','centered','overlay'].map(l=>`<button class="pill ${B.layout===l?'active':''}" data-blay="${l}">${l.replace('-',' ')}</button>`).join('')}</div></div>`;
  h+=`<div class="grp"><div class="grp-title">Content</div>
    ${bField('Brand','brand')}${bField('Tagline','tagline')}
    ${bArea('Headline','headline')}${bArea('Subtext','sub')}
    ${bToggle('Discount badge','showBadge')}
    ${B.showBadge?bField('Badge — top','badgeLabel')+bField('Badge — big','badge')+bField('Badge — bottom','badgeSub'):''}
    ${bToggle('Feature pills','showFeatures')}
    ${B.showFeatures?bField('Features (· separated)','features'):''}
    ${bToggle('CTA button','showCta')}
    ${B.showCta?bField('CTA label','cta'):''}
    ${bField('Disclaimer','disclaimer')}</div>`;
  h+=`<div class="grp"><div class="grp-title">Colors</div>
    <div class="swatches">${bColor('Background','bg')}${bColor('Accent','accent')}</div>
    <div class="swatches" style="margin-top:10px">${bColor('Text','text')}${bColor('CTA fill','ctaBg')}</div></div>`;
  h+=`<div class="grp"><button class="top-btn" style="width:100%" id="b-img-btn">${B.img?'Replace':'Add'} product image</button>
    ${B.img?'<button class="top-btn" style="width:100%;margin-top:8px" id="b-img-rm">Remove image</button>':''}
    <div class="hint" style="margin-top:10px">Maquetador de banners original · sube tus propios logos e imágenes.</div></div>`;
  panel.innerHTML=h;
  wireBanner();
}
function wireBanner(){
  panel.querySelectorAll('[data-bfmt]').forEach(b=>b.addEventListener('click',()=>{B.format=b.dataset.bfmt;buildBannerPanel();bRender();}));
  panel.querySelectorAll('[data-blay]').forEach(b=>b.addEventListener('click',()=>{B.layout=b.dataset.blay;buildBannerPanel();bRender();}));
  panel.querySelectorAll('[data-bk]').forEach(inp=>inp.addEventListener('input',()=>{
    B[inp.dataset.bk]=inp.value.replace(/ ⏎ /g,'\n');bRender();}));
  panel.querySelectorAll('[data-bc]').forEach(inp=>inp.addEventListener('input',()=>{
    B[inp.dataset.bc]=inp.value;const chip=inp.parentElement.querySelector('.chip');if(chip)chip.style.background=inp.value;
    inp.parentElement.childNodes[2].textContent=inp.value;bRender();}));
  panel.querySelectorAll('[data-btk]').forEach(b=>b.addEventListener('click',()=>{B[b.dataset.btk]=!B[b.dataset.btk];buildBannerPanel();bRender();}));
  const ib=document.getElementById('b-img-btn');
  if(ib)ib.addEventListener('click',()=>{const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
    inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const img=new Image();
      img.onload=()=>{B.img=img;buildBannerPanel();bRender();toast('Image added');};img.src=URL.createObjectURL(f);};inp.click();});
  const rm=document.getElementById('b-img-rm');
  if(rm)rm.addEventListener('click',()=>{B.img=null;buildBannerPanel();bRender();});
}

/* ═══════════════ Init ═══════════════ */
try{glInit();}catch(e){console.error('GL init:',e);glOK=false;toast('WebGL error — Compose disabled');}
setMode('effects');
window.addEventListener('resize',()=>{if(MODE==='compose')glRender();else render();});
</script>
