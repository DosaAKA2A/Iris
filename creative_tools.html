<script>
"use strict";
/* ═══════════════════════════════════════════════════════════════
   Creative Tools · IRIS Studio · V2
   COMPOSE : compositor WebGL (gradiente mesh + blend + óptica + grain + glass)
   REDUCE  : motor Canvas 2D (dither / halftone / ascii / dots / pixel)
   Código original. Técnicas de dominio público. Sin backend, libre de usar.
   ═══════════════════════════════════════════════════════════════ */

let MODE='compose';
let PHOTO=null;                      // HTMLImageElement compartido
const MAX_DIM=1100;

const glview=document.getElementById('glview');
const view=document.getElementById('view');
const vctx=view.getContext('2d');
const panel=document.getElementById('panel');
const rail=document.getElementById('rail');
const stage=document.getElementById('stage');
const dropHint=document.getElementById('drop-hint');

const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const hexRGB=h=>{h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];};
const hexF=h=>hexRGB(h).map(v=>v/255);
function toast(m){const t=document.getElementById('toast');t.innerHTML=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);}

/* ─────────────── COMPOSE state ─────────────── */
const G={
  stops:[{c:'#6c5ce7',p:0},{c:'#a29bfe',p:0.28},{c:'#fd79a8',p:0.55},{c:'#ffb8a2',p:0.78},{c:'#ffe08a',p:1}],

// Cada preset tiene: stops, shape (0=linear,1=radial,2=conic), angle, warp, scale, detail, contrast
// Esto garantiza que cada preset tenga una personalidad visual distinta, no solo de color.
const GRAD_PRESETS={

  'Oil slick': {stops:[['#00c2ff',0],['#7a5cff',.35],['#ff4ecd',.65],['#00ffa3',1]],shape:2,angle:0,  warp:0.15,scale:1.2, detail:1,contrast:1.3},
  'Sunset':    {stops:[['#ff9a3c',0],['#ff5c8a',.5],['#8a4fff',1]],                shape:1,angle:0,  warp:0.55,scale:1.4, detail:3,contrast:1.2},
  'Aurora':    {stops:[['#00ffa3',0],['#00c2ff',.45],['#7a5cff',1]],               shape:0,angle:95, warp:0.72,scale:2.1, detail:5,contrast:0.9},
  'Ember':     {stops:[['#ff5c38',0],['#ffb03a',.5],['#2b0a12',1]],                shape:1,angle:0,  warp:0.2, scale:0.9, detail:2,contrast:1.5},
  'Mono ink':  {stops:[['#0a0a0c',0],['#6b6b74',.5],['#f4f2ea',1]],               shape:0,angle:145,warp:0,   scale:1.0, detail:0,contrast:1.0},
  'Velvet':    {stops:[['#1a0533',0],['#6b21a8',.35],['#e879f9',.7],['#fde68a',1]],shape:1,angle:0, warp:0.6, scale:1.8, detail:4,contrast:1.3},
  'Ocean':     {stops:[['#0f172a',0],['#0369a1',.4],['#06b6d4',.75],['#e0f2fe',1]],shape:0,angle:200,warp:0.8,scale:2.4, detail:6,contrast:0.85},
  'Neon Tokyo':{stops:[['#0d0221',0],['#ff0080',.3],['#7928ca',.6],['#00d4ff',1]], shape:2,angle:0, warp:0.3, scale:1.5, detail:2,contrast:1.6},

  'Mars':      {stops:[['#1c0000',0],['#9f1239',.4],['#fb923c',.75],['#fef3c7',1]],shape:1,angle:0, warp:0.25,scale:0.75,detail:2,contrast:1.4},

  'Darkroom':  {stops:[['#0a0a0c',0],['#ff5c38',.4],['#1a0a06',1]],               shape:1,angle:0,  warp:0.1, scale:0.6, detail:1,contrast:1.8},
  'Cobalt':    {stops:[['#03045e',0],['#0077b6',.4],['#00b4d8',.7],['#caf0f8',1]], shape:0,angle:310,warp:0.5,scale:1.9, detail:4,contrast:1.0},

  'Soft blush':{stops:[['#fff1f2',0],['#fda4af',.4],['#c084fc',.75],['#e0e7ff',1]],shape:0,angle:230,warp:0.4,scale:1.6, detail:2,contrast:0.95},

/* ─────────────── WebGL ─────────────── */
const gl=glview.getContext('webgl',{preserveDrawingBuffer:true,antialias:true,premultipliedAlpha:false});
let glOK=!!gl, tex=null, prog=null, U={};
const VERT=`attribute vec2 a;varying vec2 v;void main(){v=a*0.5+0.5;gl_Position=vec4(a,0.,1.);}`;
const FRAG=`precision highp float;varying vec2 v;
uniform vec2 u_res;uniform sampler2D u_photo;uniform float u_hasPhoto;
uniform vec3 u_sc[8];uniform float u_sp[8];uniform int u_sn;
uniform int u_shape;uniform float u_angle,u_scale,u_warp,u_contrast,u_gopac;
uniform int u_detail,u_blend,u_glass;uniform float u_aberr,u_grain,u_glassAmt,u_time;
float hash(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
 float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
 return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);}
float fbm(vec2 p,int oct){float s=0.,a=.5;for(int i=0;i<8;i++){if(i>=oct)break;s+=a*noise(p);p*=2.02;a*=.5;}return s;}
vec3 gcol(float t){t=clamp(t,0.,1.);vec3 c=u_sc[0];
 for(int i=0;i<7;i++){if(i+1>=u_sn)break;float p0=u_sp[i],p1=u_sp[i+1];
  if(t>=p0){float f=clamp((t-p0)/max(p1-p0,1e-4),0.,1.);c=mix(u_sc[i],u_sc[i+1],f);}}return c;}
float gT(vec2 uv){vec2 p=uv-0.5;float c=cos(u_angle),s=sin(u_angle);p=mat2(c,-s,s,c)*p;p*=u_scale;
 if(u_warp>0.){vec2 q=vec2(fbm(p*1.5+u_time*.1,u_detail),fbm(p*1.5+vec2(5.2,1.3)-u_time*.1,u_detail));p+=(q-0.5)*u_warp*2.;}
 float t;if(u_shape==1)t=length(p)*1.2;else if(u_shape==2)t=atan(p.y,p.x)/6.2831853+0.5;else t=p.x+0.5;
 return (t-0.5)*u_contrast+0.5;}
vec3 blend(vec3 b,vec3 s,int m){
 if(m==1)return b*s;

function wireCompose(){
  panel.querySelectorAll('input[type=range]').forEach(r=>r.addEventListener('input',()=>{
    const o=r.dataset.o==='G'?G:S;o[r.dataset.k]=+r.value;
    const mul=+r.dataset.m||1;const val=(+r.value)*mul;
    const el=document.getElementById('v-'+r.dataset.k);if(el)el.textContent=((r.step<1||mul!==1)?val.toFixed(2):Math.round(val))+(r.dataset.u||'');

      const up=()=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);buildComposePanel();};
      window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);});

  if(bar)bar.addEventListener('click',e=>{
    if(e.target.classList.contains('stop'))return;if(G.stops.length>=8){toast('Max 8 stops');return;}
    const r=bar.getBoundingClientRect();const p=clamp((e.clientX-r.left)/r.width,0,1);

  const del=document.getElementById('stop-del');
  if(del)del.addEventListener('click',()=>{if(G.stops.length<=2){toast('Need ≥2 stops');return;}
    G.stops.splice(G.sel,1);G.sel=0;buildComposePanel();glRender();});

  if(sd)sd.addEventListener('click',sendToReduce);

function renderAscii(w,h){const cw=S.cell*1.7,ch=cw*1.6;const gw=Math.max(1,Math.round(w/cw)),gh=Math.max(1,Math.round(h/ch));
  const id=gridBuffer(gw,gh),d=id.data,chars=S.charset.length?S.charset:' .:-=+*#%@';view.width=w;view.height=h;
  vctx.fillStyle=S.colorMode==='mono'?S.paper:'#08080a';vctx.fillRect(0,0,w,h);
  vctx.font=`${ch*0.92}px 'Geist Mono',monospace`;vctx.textBaseline='top';
  for(let y=0;y<gh;y++)for(let x=0;x<gw;x++){const i=(y*gw+x)*4,L=lum(d[i],d[i+1],d[i+2])/255;
    const idx=clamp(Math.floor((1-L)*(chars.length-1)),0,chars.length-1),c=chars[idx];if(c===' ')continue;
    vctx.fillStyle=S.colorMode==='mono'?S.ink:`rgb(${d[i]},${d[i+1]},${d[i+2]})`;vctx.fillText(c,x*cw,y*ch);}
  setHud(gw,gh);}
function renderPixel(w,h){const gw=Math.max(1,Math.round(w/S.cell)),gh=Math.max(1,Math.round(h/S.cell));
  const id=gridBuffer(gw,gh),d=id.data;
  if(S.colorMode==='mono'){const ink=hexRGB(S.ink),pap=hexRGB(S.paper);
    for(let i=0;i<d.length;i+=4){const t=lum(d[i],d[i+1],d[i+2])/255;d[i]=ink[0]+(pap[0]-ink[0])*t;d[i+1]=ink[1]+(pap[1]-ink[1])*t;d[i+2]=ink[2]+(pap[2]-ink[2])*t;}}
  if(!S.studs){paintGrid(id,gw,gh,w,h);setHud(gw,gh);return;}
  view.width=w;view.height=h;vctx.imageSmoothingEnabled=false;const cw=w/gw,chh=h/gh;
  for(let y=0;y<gh;y++)for(let x=0;x<gw;x++){const i=(y*gw+x)*4;vctx.fillStyle=`rgb(${d[i]},${d[i+1]},${d[i+2]})`;vctx.fillRect(x*cw,y*chh,cw+0.5,chh+0.5);
    const g=vctx.createRadialGradient(x*cw+cw*0.5,y*chh+chh*0.5,1,x*cw+cw*0.5,y*chh+chh*0.5,cw*0.4);
    g.addColorStop(0,'rgba(255,255,255,.18)');g.addColorStop(1,'rgba(0,0,0,.14)');
    vctx.fillStyle=g;vctx.beginPath();vctx.arc(x*cw+cw*0.5,y*chh+chh*0.5,Math.min(cw,chh)*0.34,0,7);vctx.fill();}
  setHud(gw,gh);}
function renderNone(w,h){const id=gridBuffer(w,h);view.width=w;view.height=h;vctx.imageSmoothingEnabled=false;vctx.putImageData(id,0,0);document.getElementById('hud-b').textContent=w+'×'+h;}
function setHud(gw,gh){document.getElementById('hud-b').textContent=gw+'×'+gh+' cells';}
function reduceSize(){let w,h;if(S.img){w=S.img.naturalWidth;h=S.img.naturalHeight;}else{w=880;h=560;}
  const s=Math.min(1,MAX_DIM/Math.max(w,h));return[Math.round(w*s),Math.round(h*s)];}
let rRAF=null;
function render(){if(MODE!=='reduce')return;if(rRAF)return;rRAF=requestAnimationFrame(()=>{rRAF=null;const[w,h]=reduceSize();
  document.getElementById('hud-a').textContent=S.style.toUpperCase();
  try{({dither:renderDither,halftone:renderHalftone,ascii:renderAscii,dots:renderDots,pixel:renderPixel,none:renderNone}[S.style])(w,h);}catch(e){console.error(e);}});}

function rPills(label,key,opts){return `<div class="ctl"><div class="ctl-head"><span class="ctl-label">${label}</span></div>
  <div class="pills">${opts.map(([v,t])=>`<button class="pill ${S[key]===v?'active':''}" data-pk="${key}" data-pv="${v}">${t}</button>`).join('')}</div></div>`;}
function rSlider(label,key,min,max,step,unit=''){return `<div class="ctl"><div class="ctl-head"><span class="ctl-label">${label}</span>
  <span class="ctl-val" id="rv-${key}">${S[key]}${unit}</span></div>
  <input type="range" min="${min}" max="${max}" step="${step}" value="${S[key]}" data-rk="${key}" data-u="${unit}"></div>`;}
function rSwatches(){return `<div class="ctl"><div class="swatches">
  <div class="swatch"><label>Ink</label><div class="swatch-btn"><span class="chip" id="chip-ink" style="background:${S.ink}"></span>${S.ink}<input type="color" value="${S.ink}" data-color="ink"></div></div>
  <div class="swatch"><label>Paper</label><div class="swatch-btn"><span class="chip" id="chip-paper" style="background:${S.paper}"></span>${S.paper}<input type="color" value="${S.paper}" data-color="paper"></div></div></div></div>`;}
function rToggle(label,key){return `<div class="ctl"><div class="toggle-row"><span class="ctl-label">${label}</span><button class="switch ${S[key]?'on':''}" data-tk="${key}"></button></div></div>`;}
const DUO=[['#1a1330','#f2e9d8','Sepia'],['#0b1c2c','#e8f0ff','Blueprint'],['#2b0a12','#ffd9c0','Safelight'],['#0d1f14','#e6ffe9','Phosphor'],['#14141a','#f4f2ea','Ink/Paper'],['#000000','#ffffff','Pure B/W']];
function buildReducePanel(){let h='';
  h+=`<div class="grp"><div class="grp-title">Engine</div>`;
  if(S.style==='dither')h+=rPills('Algorithm','ditherAlgo',[['floyd','Floyd'],['atkinson','Atkinson'],['bayer4','Bayer 4'],['bayer8','Bayer 8'],['threshold','Thresh'],['random','Random']]);
  if(S.style==='halftone')h+=rToggle('Angle 45°','angle');
  if(S.style==='pixel')h+=rToggle('Lego studs','studs');
  if(S.style==='ascii')h+=`<div class="ctl"><div class="ctl-head"><span class="ctl-label">Character ramp</span></div><input class="charset-input" id="charset" value="${S.charset.replace(/"/g,'&quot;')}" spellcheck="false"></div>`;
  if(S.style!=='none')h+=rPills('Color','colorMode',[['mono','Duotone'],['color','Color']]);
  h+=`</div>`;
  if(S.style!=='none'){h+=`<div class="grp"><div class="grp-title">Resolution</div>${rSlider('Cell size','cell',1,20,1,'px')}`;
    if(S.colorMode==='color'&&S.style!=='pixel'&&S.style!=='dots')h+=rSlider('Levels / channel','levels',2,8,1);h+=`</div>`;}
  if(S.style!=='none'&&S.colorMode==='mono')h+=`<div class="grp"><div class="grp-title">Duotone</div>${rSwatches()}
    <div class="ctl"><div class="preset-grid">${DUO.map(([ink,pap,name])=>`<button class="preset" data-ink="${ink}" data-paper="${pap}">${name}</button>`).join('')}</div></div></div>`;
  h+=`<div class="grp"><div class="grp-title">Adjust</div>${rSlider('Brightness','brightness',0,200,1,'%')}${rSlider('Contrast','contrast',0,200,1,'%')}${rSlider('Saturation','saturation',0,200,1,'%')}${rSlider('Hue','hue',0,360,1,'°')}${rToggle('Invert','invert')}</div>`;
  h+=`<div class="grp"><div class="hint">Motor Canvas 2D original · procesado en tu navegador.</div></div>`;
  panel.innerHTML=h;wireReduce();}
function wireReduce(){
  panel.querySelectorAll('input[type=range]').forEach(r=>r.addEventListener('input',()=>{S[r.dataset.rk]=+r.value;
    document.getElementById('rv-'+r.dataset.rk).textContent=r.value+(r.dataset.u||'');render();}));
  panel.querySelectorAll('[data-pk]').forEach(b=>b.addEventListener('click',()=>{S[b.dataset.pk]=b.dataset.pv;buildReducePanel();render();}));
  panel.querySelectorAll('[data-tk]').forEach(b=>b.addEventListener('click',()=>{S[b.dataset.tk]=!S[b.dataset.tk];b.classList.toggle('on');render();}));
  panel.querySelectorAll('[data-color]').forEach(inp=>inp.addEventListener('input',()=>{S[inp.dataset.color]=inp.value;
    const chip=document.getElementById('chip-'+inp.dataset.color);if(chip)chip.style.background=inp.value;inp.parentElement.childNodes[2].textContent=inp.value;render();}));
  panel.querySelectorAll('[data-ink]').forEach(b=>b.addEventListener('click',()=>{S.ink=b.dataset.ink;S.paper=b.dataset.paper;buildReducePanel();render();}));
  const cs=document.getElementById('charset');if(cs)cs.addEventListener('input',()=>{S.charset=cs.value;render();});
}

/* ═══════════════ Rail (context-aware) ═══════════════ */
const REDUCE_STYLES=[['dither','Dither'],['halftone','Half'],['ascii','ASCII'],['dots','Dots'],['pixel','Pixel'],['none','Raw']];
const SHAPE_ICONS=[
  // linear
  `<svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="sl" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6c5ce7"/><stop offset="100%" stop-color="#ffe08a"/></linearGradient></defs><rect x="3" y="3" width="22" height="22" rx="4" fill="url(#sl)"/></svg>`,
  // radial
  `<svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="sr" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffe08a"/><stop offset="100%" stop-color="#6c5ce7"/></radialGradient></defs><rect x="3" y="3" width="22" height="22" rx="4" fill="url(#sr)"/></svg>`,
  // conic
  `<svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="sc1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00ffa3"/><stop offset="50%" stop-color="#7928ca"/><stop offset="100%" stop-color="#ff0080"/></linearGradient></defs><rect x="3" y="3" width="22" height="22" rx="4" fill="url(#sc1)"/><path d="M14 14 L14 3 A11 11 0 0 1 25 14 Z" fill="rgba(255,255,255,.18)"/></svg>`,
];
function buildRail(){
  if(MODE==='compose'){
    // Shape selector + gradient presets
    const shapeHtml=`<div class="rail-lbl">Shape</div>`+SHAPE_ICONS.map((svg,i)=>
      `<button class="rail-btn ${G.shape===i?'active':''}" data-sh="${i}" title="${['Linear','Radial','Conic'][i]}" style="width:44px;height:36px;padding:3px">${svg}</button>`
    ).join('')+`<div class="rail-sep"></div><div class="rail-lbl">Preset</div>`;
    const presetHtml=Object.entries(GRAD_PRESETS).map(([name,p])=>{
      const css=`linear-gradient(135deg,${p.stops.map(([c,pos])=>`${c} ${pos*100}%`).join(',')})`;
      return `<button class="rail-swatch" title="${name}" data-gp="${name}" style="background:${css}"></button>`;
    }).join('');
    rail.innerHTML=shapeHtml+presetHtml;
    // shape buttons
    rail.querySelectorAll('[data-sh]').forEach(b=>b.addEventListener('click',()=>{
      G.shape=+b.dataset.sh;
      rail.querySelectorAll('[data-sh]').forEach(x=>x.classList.toggle('active',+x.dataset.sh===G.shape));
      buildComposePanel();glRender();toast(['Linear','Radial','Conic'][G.shape]);}));
    // preset buttons — aplica color Y forma
    rail.querySelectorAll('[data-gp]').forEach(b=>b.addEventListener('click',()=>{
      const p=GRAD_PRESETS[b.dataset.gp];
      G.stops=p.stops.map(([c,pos])=>({c,p:pos}));G.sel=0;
      G.shape=p.shape;G.angle=p.angle;G.warp=p.warp;G.scale=p.scale;G.detail=p.detail;G.contrast=p.contrast;
      rail.querySelectorAll('[data-sh]').forEach(x=>x.classList.toggle('active',+x.dataset.sh===G.shape));
      buildComposePanel();glRender();toast(b.dataset.gp);}));
  }else{
    rail.innerHTML=REDUCE_STYLES.map(([v,t])=>`<button class="rail-btn ${S.style===v?'active':''}" data-style="${v}">
      <span class="rl">${t}</span></button>`).join('');
    rail.querySelectorAll('[data-style]').forEach(b=>b.addEventListener('click',()=>{
      rail.querySelectorAll('.rail-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');
      S.style=b.dataset.style;buildReducePanel();render();}));
  }
}

/* ═══════════════ Mode switch ═══════════════ */
function setMode(m){
  MODE=m;
  document.querySelectorAll('.modesw button').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
  const compose=m==='compose';
  glview.style.display=compose?'block':'none';
  view.style.display=compose?'none':'block';
  document.getElementById('btn-animate').style.display=compose?'':'none';
  document.getElementById('btn-random').style.display=compose?'':'none';
  document.getElementById('drop-hint').style.display=PHOTO?'none':'';
  buildRail();
  if(compose){buildComposePanel();glRender();}else{buildReducePanel();render();}
}
document.querySelectorAll('.modesw button').forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode)));

/* ═══════════════ Shared: load / export / random ═══════════════ */
function loadFile(file){if(!file||!file.type.startsWith('image/')){toast('Not an image file');return;}
  const img=new Image();img.onload=()=>{PHOTO=img;S.img=img;dropHint.style.display='none';
    if(glOK)uploadPhoto(img);toast(`Loaded <b>${img.naturalWidth}×${img.naturalHeight}</b>`);
    if(MODE==='compose')glRender();else render();};
  img.onerror=()=>toast('Could not decode image');img.src=URL.createObjectURL(file);}
const fileInput=document.getElementById('file');
fileInput.addEventListener('change',e=>loadFile(e.target.files[0]));
document.getElementById('btn-upload').addEventListener('click',()=>fileInput.click());
document.getElementById('drop-cta').addEventListener('click',()=>fileInput.click());
stage.addEventListener('dragover',e=>{e.preventDefault();stage.classList.add('dragover');});
stage.addEventListener('dragleave',()=>stage.classList.remove('dragover'));
stage.addEventListener('drop',e=>{e.preventDefault();stage.classList.remove('dragover');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
window.addEventListener('paste',e=>{const it=[...e.clipboardData.items].find(i=>i.type.startsWith('image/'));if(it)loadFile(it.getAsFile());});

function sendToReduce(){if(!glOK)return;glRender();
  glview.toBlob(blob=>{const img=new Image();img.onload=()=>{PHOTO=img;S.img=img;setMode('reduce');toast('Sent composite to <b>Reduce</b>');};img.src=URL.createObjectURL(blob);},'image/png');}

document.getElementById('btn-export').addEventListener('click',()=>{
  const canvas=MODE==='compose'?glview:view;
  if(MODE==='compose')glRender();
  canvas.toBlob(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`iris-${MODE}-${Date.now()}.png`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);toast('Exported <b>PNG</b>');},'image/png');});

document.getElementById('btn-random').addEventListener('click',()=>{
  const keys=Object.keys(GRAD_PRESETS);
  const p=GRAD_PRESETS[keys[Math.floor(Math.random()*keys.length)]];
  G.stops=p.stops.map(([c,pos])=>({c,p:pos}));G.sel=0;
  G.shape=p.shape;G.angle=p.angle;G.warp=p.warp;G.scale=p.scale;G.detail=p.detail;G.contrast=p.contrast;
  G.blend=Math.floor(Math.random()*BLENDS.length);G.aberration=+(Math.random()*0.8).toFixed(2);
  buildComposePanel();glRender();toast('Randomized');});

document.getElementById('btn-animate').addEventListener('click',()=>{
  G.animate=!G.animate;document.getElementById('btn-animate').classList.toggle('on',G.animate);
  if(G.animate&&!animRAF)animRAF=requestAnimationFrame(animLoop);});

/* ═══════════════ Reset all ═══════════════ */
const G_DEFAULTS={shape:0,angle:19,scale:1.66,warp:0.43,detail:2,contrast:1.14,opacity:0.85,blend:3,aberration:0.38,softness:0,grain:0.06,blur:0,glass:0,glassAmt:0.5,animate:false,time:0};
const S_DEFAULTS={style:'dither',ditherAlgo:'floyd',colorMode:'mono',levels:4,cell:5,contrast:100,brightness:100,saturation:100,hue:0,invert:false,ink:'#14141a',paper:'#f4f2ea',charset:' .:-=+*#%@',studs:false,angle:false};
document.getElementById('btn-reset-all').addEventListener('click',()=>{
  if(MODE==='compose'){
    Object.assign(G,G_DEFAULTS);
    const iris=GRAD_PRESETS['Iris'];
    G.stops=iris.stops.map(([c,p])=>({c,p}));G.sel=0;
    G.shape=iris.shape;G.angle=iris.angle;G.warp=iris.warp;G.scale=iris.scale;G.detail=iris.detail;G.contrast=iris.contrast;G.animate=false;
    document.getElementById('btn-animate').classList.remove('on');
    if(animRAF){cancelAnimationFrame(animRAF);animRAF=null;}
    buildComposePanel();glRender();
  }else{
    Object.assign(S,S_DEFAULTS);
    buildReducePanel();render();
  }
  toast('Settings reset');
});
// mostrar/ocultar reset según modo
const _origSetMode=setMode;

/* ═══════════════ Scroll zoom (parallax) ═══════════════ */
let _zoom=1.0;
stage.addEventListener('wheel',e=>{
  e.preventDefault();
  _zoom=Math.min(3,Math.max(0.4,_zoom-e.deltaY*0.0012));
  const wrap=document.querySelector('.canvas-wrap');
  wrap.style.transform=`scale(${_zoom})`;
  wrap.style.transformOrigin='center center';
  wrap.style.transition='transform .12s cubic-bezier(.25,.46,.45,.94)';
},{passive:false});
// doble click para reset zoom
stage.addEventListener('dblclick',()=>{
  _zoom=1;
  const wrap=document.querySelector('.canvas-wrap');
  wrap.style.transform='scale(1)';
  toast('Zoom reset');
});

/* ═══════════════ Init ═══════════════ */
try{glInit();}catch(e){console.error('GL init:',e);glOK=false;toast('WebGL error — Compose disabled');}
setMode('compose');
window.addEventListener('resize',()=>{if(MODE==='compose')glRender();else render();});
</script>
</body>
